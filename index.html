<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Violette</title>
  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: #f2f0e8;
      font-family: Georgia, serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
    }
    main {
      max-width: 720px;
      padding: 2rem;
    }
    h1 {
      font-size: 4rem;
      letter-spacing: .18em;
      margin-bottom: .5rem;
    }
    .mark {
      color: #b21f24;
      font-size: 2rem;
      margin: 1rem 0;
    }
    p {
      font-size: 1.25rem;
      line-height: 1.6;
    }
    a {
      color: #f2f0e8;
    }
  </style>
</head>
<body>
  <main>
    <h1>VIOLETTE</h1>
    <div class="mark">✦</div>
    <p><strong>History deserves to be carried.</strong></p>
    <p>
      A free archive of printable artwork inspired by those who resisted authoritarianism,
      defended democracy, expanded civil rights, and fought for human dignity.
    </p>
    <p>The archive opens soon.</p>
    <p><a href="mailto:resist@violette.ink">resist@violette.ink</a></p>
  </main>
</body>
</html>
